<section id="glossaire">
  <div class="section-label">Référence</div>
  <h2 class="section-title fade-in">GLOSSAIRE <span style="color:var(--gold)">COMPLET</span></h2>
  <p class="section-desc">Tous les termes financiers essentiels en un seul endroit. Cherchez n'importe quel mot.</p>

  <div class="glossary-search fade-in">
    <input type="text" class="search-input" id="glossarySearch" placeholder="Rechercher un terme... ex: leverage, pip, dividende" (input)="filterGlossary()" />
  </div>
  <div class="glossary-grid" id="glossaryGrid"></div>
</section>
